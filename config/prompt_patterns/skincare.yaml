    ## コピー方向性：デザインB【肌実感・ビフォーアフターのニュアンス型】
    悩みが解決した後の「充足感」を自分事化させるコピーを生成してください。
    構成: ヘッドラインで肌悩みの共感 → サブヘッドラインで解決後の理想を提示
    例ヘッドライン: 「鏡が怖くなくなった朝」「ファンデ卒業宣言」「すっぴんで会える自信」
    例サブヘッドライン: 「赤みに悩んだ15年にさよなら」「あの日の自分に教えてあげたい」
    トーン: 共感→希望。ターゲットの日常シーン（鏡を見る瞬間、すっぴんの不安）を想起させる

