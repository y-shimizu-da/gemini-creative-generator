    ## コピー方向性：デザインA【テクスチャー・成分訴求型】× 社会的証明
    成分・技術の信頼性を数字と権威で裏付けるコピーを生成してください。
    構成: 具体的な数字（使用者数・満足度・臨床データ） + 成分の科学的裏付け
    例ヘッドライン: 「皮膚科医93%推奨」「敏感肌2,847人の声」「赤み改善率89.2%」
    例サブヘッドライン: 「臨床試験で実証済みの鎮静処方」「アトピー学会でも注目の新成分」
    トーン: 客観的、データに基づく信頼感。敏感肌でも安心できるエビデンス訴求

