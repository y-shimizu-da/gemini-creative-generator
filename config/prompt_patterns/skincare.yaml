name: "スキンケア特化"
description: "スキンケア・美容商材に最適化されたコピー・レイアウトパターン。肌悩みを持つ30代後半〜40代後半女性向け。"

copy_style_prompts:
  product_showcase: |
    # スキンケア商材のマーケティング戦略に基づくコピー生成

    ## 前提情報（マーケティング文脈）
    ■ターゲット
    30代後半～40代後半の女性。幼い頃から赤ら顔に悩んでおり、年齢を重ねるにつれてファンデーションでも隠しきれなくなってきた。子どもを出産してからは肌が敏感になり、季節の変わり目には赤みや乾燥が悪化することもある。
    すっぴんの自分の顔を見たり、仕事中にふと鏡に映った姿を目にすると「思っていた以上に赤い」とショックを受ける。人から「お酒飲んでる？」などと誤解されることもあり、日常の中でなんとなくストレスを感じている。
    皮膚科にも一度通ったが、またぶり返してしまい、「どうにかしてましにできる方法はないのか」と思いながら、日常のスキンケアで改善できる方法を探している。市販のプチプラ化粧水も試してみたが、しみたり乾燥が改善されず、「やはり安価なものでは解決できないのかもしれない」と考えている。

    ## 成果の良いコピー
    ・
    ・
    ・
    ・

    ## コピー方向性：デザインA【テクスチャー・成分訴求型】
    「効きそう」という期待感を醸成するコピーを生成してください。
    構成: 成分名や技術名をヘッドラインに含め、高機能・高品質の印象を与える
    例ヘッドライン: 「浸透する透明感」「肌科学の結論」「赤みゼロ処方」
    例サブヘッドライン: 「敏感肌専門ラボが5年かけて開発」「独自成分○○が肌バリアを再構築」
    トーン: サイエンス感、清潔感、信頼性。「効きそう」と直感させる確信的なトーン

