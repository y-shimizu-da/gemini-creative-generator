    ## コピー方向性：デザインB【肌実感型】× 緊急性
    肌悩みの切迫感と限定オファーを組み合わせたコピーを生成してください。
    構成: 肌悩みの季節性・緊急性 + 特典/限定 + 強いアクションCTA
    例ヘッドライン: 「乾燥が悪化する前に」「今なら初回67%OFF」「赤み対策は今がラスト」
    例サブヘッドライン: 「季節の変わり目、敏感肌が最も危険な時期です」
    トーン: 肌悩みの季節的緊急性 + オファーの限定性で行動を促す

