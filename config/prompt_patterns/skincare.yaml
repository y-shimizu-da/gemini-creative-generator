    ## コピー方向性：デザインB【肌実感型】× UGC証言
    同じ悩みを持つ実在の女性の声としてコピーを生成してください。
    構成: リアルな使用者の声（年代・肌悩み属性付き） + ビフォーアフター体験 + 推薦
    例ヘッドライン: 「赤ら顔15年の私が泣いた」「すっぴんが怖くなくなった」「ファンデ不要になった朝」
    例サブヘッドライン: 「42歳・敏感肌・赤ら顔歴20年」「皮膚科でダメだった私が出会えた」
    トーン: 素朴で等身大、同じ肌悩みを持つ仲間からのリアルな体験談風。広告っぽさを排除

layout_prompts:
  product_showcase: |
    デザインA【テクスチャー・成分訴求型】レイアウト。
    「効きそう」という期待感を醸成する、高品質なサイエンス・クリーンデザイン。
    ビジュアル: 美容液の滴、みずみずしいテクスチャーのアップ、または成分の浸透をイメージさせるクリスタルな背景。
    商品を中央やや上に配置し、40-50%のキャンバスを占める。
    テクスチャーや美容液の滴を商品周囲に散りばめ、浸透感を演出。
    色調: 白、透明感、ライトブルー、またはブランドカラーを基調とした清潔感。
    ヘッドラインは上部、CTAは下部中央。

  benefit_highlight: |
    デザインB【肌実感・ビフォーアフターのニュアンス型】レイアウト。
    悩みが解決した後の「充足感」を自分事化させるデザイン。
    ビジュアル: 鏡を見て微笑む女性のアップ（特に肌のツヤを強調）。
    画面分割: 左側は「悩み」を暗い色調で、右側は「解決」を明るい色調で表現。
    または、自然光を感じる温かいライティングで健康的な肌を強調。
    ヘッドラインは左半分に大きく配置、CTAは下部左側。

  social_proof: |
    デザインA【テクスチャー・成分訴求型】× 社会的証明レイアウト。
    サイエンス・クリーンな背景に、数字バッジやレビュー星評価を目立つように配置。
    商品を中央に、上部に信頼性を示す数字ヘッドライン。
    クリスタルな背景や成分の浸透イメージで高品質感を維持。
    色調: 白、透明感、ライトブルー基調。CTAは下部中央。

  urgency_offer: |
    デザインB【肌実感型】× 緊急性レイアウト。
    温かみのあるライティングの肌ビジュアルをベースに、割引/特典の数字を大きく中央に配置。
    季節感のある要素（乾燥、風、季節の変わり目）をさりげなく背景に。
    商品はやや小さめに横配置。ヘッドラインは上部に緊急性を示す表現。
    CTAボタンは大きく目立つように下部に配置。

  testimonial: |
    デザインB【肌実感型】× UGC/証言レイアウト。
    自然光の中、肌を触る女性や鏡を見て微笑む女性のイメージ。
    大きな引用符スタイルのテキストを中央に配置。
    商品は小さめにコーナーまたは下部に配置。
    ナチュラルでエディトリアルなデザイン（雑誌の体験談風）。
    CTAは控えめに下部に。

  minimal_premium: |
    デザインA【テクスチャー・成分訴求型】× ミニマルプレミアムレイアウト。
    最大限のネガティブスペース（60%以上が白/クリーン）。
    美容液の一滴や透明なテクスチャーだけを中央に配置。
    テキストは1行のみ、下部にシンプルに。CTAはテキストリンク風。
    色調: 白、透明感。Apple的なエレガンスとスキンケアの清潔感を融合。

  reference_based: |
    デザインC【参考画像踏襲】レイアウト。
    参考画像で送っている画像を参考にブラッシュアップして作成してください。
    参考画像のレイアウト構成、色使い、タイポグラフィの雰囲気を踏襲しつつ、
    商品情報とコピーを差し替えて、よりクオリティの高いデザインに仕上げる。
