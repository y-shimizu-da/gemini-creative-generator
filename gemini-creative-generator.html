<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini クリエイティブ一括生成ツール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f0f1a;
  --bg-secondary:#1a1a2e;
  --bg-card:#16213e;
  --bg-input:#0d1b2a;
  --accent:#e94560;
  --accent-green:#00b894;
  --accent-blue:#4361ee;
  --accent-yellow:#f9c74f;
  --text-primary:#eaeaea;
  --text-secondary:#8892a4;
  --border:#2a2a4a;
  --radius:10px;
  --shadow:0 4px 20px rgba(0,0,0,.3);
}
html{font-size:14px}
body{
  font-family:'Segoe UI','Hiragino Sans',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  display:flex;
  height:100vh;
  overflow:hidden;
}
/* Sidebar */
#sidebar{
  width:340px;min-width:340px;
  background:var(--bg-secondary);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
  padding:20px;
  gap:18px;
}
#sidebar h1{font-size:1.1rem;color:var(--accent);display:flex;align-items:center;gap:8px}
#sidebar h1 span{font-size:1.3rem}
.section{display:flex;flex-direction:column;gap:8px}
.section-label{font-size:.8rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=password],textarea,select{
  background:var(--bg-input);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text-primary);
  padding:10px 12px;
  font-size:.9rem;
  outline:none;
  transition:border .2s;
  font-family:inherit;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent-blue)}
textarea{resize:vertical;min-height:120px;line-height:1.5}
/* File upload zone */
#upload-zone{
  border:2px dashed var(--border);
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:border-color .2s,background .2s;
  color:var(--text-secondary);
  font-size:.85rem;
}
#upload-zone:hover,#upload-zone.dragover{border-color:var(--accent-blue);background:rgba(67,97,238,.08)}
#upload-zone input{display:none}
#preview-images{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
#preview-images .thumb{
  position:relative;width:56px;height:56px;border-radius:6px;overflow:hidden;
  border:1px solid var(--border);
}
#preview-images .thumb img{width:100%;height:100%;object-fit:cover}
#preview-images .thumb .remove{
  position:absolute;top:-4px;right:-4px;
  background:var(--accent);color:#fff;border:none;
  border-radius:50%;width:18px;height:18px;
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
/* Config row */
.config-row{display:flex;gap:10px;align-items:center}
.config-row label{font-size:.8rem;color:var(--text-secondary);white-space:nowrap}
.config-row input[type=range]{flex:1;accent-color:var(--accent)}
.config-row .range-val{
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:6px;padding:2px 8px;font-size:.85rem;min-width:28px;text-align:center;
}
/* Buttons */
.btn{
  padding:10px 16px;border:none;border-radius:var(--radius);
  font-size:.9rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity .2s,transform .1s;
  font-family:inherit;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.85}
.btn-secondary{background:var(--accent-blue);color:#fff}
.btn-secondary:hover:not(:disabled){opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-primary)}
.btn-outline:hover:not(:disabled){border-color:var(--text-secondary)}
.btn-group{display:flex;gap:8px}
.btn-group .btn{flex:1}
/* Status bar */
#status-bar{
  margin-top:auto;
  padding:10px;
  background:var(--bg-card);
  border-radius:var(--radius);
  font-size:.8rem;
  color:var(--text-secondary);
  display:flex;align-items:center;gap:8px;
}
#status-bar .dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0}
#status-bar .dot.active{background:var(--accent-green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Progress bar */
.progress-bar{
  width:100%;height:4px;background:var(--bg-input);border-radius:2px;overflow:hidden;
  margin-top:4px;
}
.progress-bar .fill{height:100%;background:var(--accent-green);transition:width .3s;width:0}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Round tabs */
#round-tabs{
  display:flex;gap:2px;padding:12px 20px 0;
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.round-tab{
  padding:8px 18px;
  border-radius:var(--radius) var(--radius) 0 0;
  background:transparent;
  border:1px solid transparent;
  border-bottom:none;
  color:var(--text-secondary);
  cursor:pointer;font-size:.85rem;font-weight:600;
  transition:all .2s;
  font-family:inherit;
}
.round-tab:hover{color:var(--text-primary)}
.round-tab.active{
  background:var(--bg-primary);
  border-color:var(--border);
  color:var(--accent);
}
#no-rounds{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;color:var(--text-secondary);gap:12px;font-size:.95rem;
}
#no-rounds .icon{font-size:3rem;opacity:.3}
/* Results grid */
#results-area{flex:1;overflow-y:auto;padding:20px}
#results-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
/* Image card */
.image-card{
  background:var(--bg-card);
  border-radius:var(--radius);
  overflow:hidden;
  border:2px solid transparent;
  transition:border-color .3s,box-shadow .3s,opacity .3s;
  position:relative;
}
.image-card.selected{border-color:var(--accent-green);box-shadow:0 0 20px rgba(0,184,148,.2)}
.image-card.rejected{opacity:.35;border-color:rgba(233,69,96,.3)}
.image-card .card-image{
  width:100%;aspect-ratio:1;
  background:var(--bg-input);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.image-card .card-image img{width:100%;height:100%;object-fit:contain}
/* Skeleton loader */
.image-card .skeleton{
  width:100%;height:100%;
  background:linear-gradient(90deg,var(--bg-input) 25%,var(--bg-card) 50%,var(--bg-input) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Error state */
.image-card .card-error{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--accent);font-size:.8rem;padding:20px;text-align:center;
  width:100%;height:100%;
}
.image-card .card-error .err-icon{font-size:2rem}
.image-card .card-error .btn-retry{
  margin-top:6px;padding:5px 14px;border:1px solid var(--accent);
  background:transparent;color:var(--accent);border-radius:6px;
  cursor:pointer;font-size:.8rem;transition:background .2s;font-family:inherit;
}
.image-card .card-error .btn-retry:hover{background:rgba(233,69,96,.15)}
/* Card actions */
.card-actions{
  display:flex;gap:0;border-top:1px solid var(--border);
}
.card-actions button{
  flex:1;padding:8px;background:transparent;
  border:none;color:var(--text-secondary);
  cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:background .2s,color .2s;
  font-family:inherit;
}
.card-actions button:hover{background:rgba(255,255,255,.05);color:var(--text-primary)}
.card-actions button.act-select:hover{color:var(--accent-green)}
.card-actions button.act-reject:hover{color:var(--accent)}
.card-actions button.act-select.on{color:var(--accent-green);background:rgba(0,184,148,.1)}
.card-actions button.act-reject.on{color:var(--accent);background:rgba(233,69,96,.1)}
/* Badge */
.card-badge{
  position:absolute;top:8px;right:8px;
  padding:3px 10px;border-radius:20px;
  font-size:.7rem;font-weight:700;
  z-index:2;pointer-events:none;
}
.card-badge.badge-selected{background:var(--accent-green);color:#fff}
.card-badge.badge-rejected{background:var(--accent);color:#fff}
/* Toast */
#toast-container{
  position:fixed;bottom:20px;right:20px;
  display:flex;flex-direction:column;gap:8px;
  z-index:999;
}
.toast{
  padding:10px 16px;border-radius:var(--radius);
  font-size:.85rem;color:#fff;
  animation:slideIn .3s;
  max-width:320px;
}
.toast.success{background:var(--accent-green)}
.toast.error{background:var(--accent)}
.toast.info{background:var(--accent-blue)}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* Selection toolbar */
#selection-toolbar{
  display:none;
  padding:10px 20px;
  background:var(--bg-secondary);
  border-top:1px solid var(--border);
  gap:10px;align-items:center;
  flex-shrink:0;
}
#selection-toolbar.visible{display:flex}
#selection-toolbar .count{font-size:.85rem;color:var(--text-secondary);margin-right:auto}
/* Modal shared */
.modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h3{margin:0;font-size:1.1rem;color:var(--text-primary)}
.modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.5rem;cursor:pointer;padding:0 4px}
.modal-close:hover{color:var(--text-primary)}
/* Resize Results View (inline) */
#resize-view{padding:16px;overflow-y:auto;flex:1}
#resize-view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
#resize-progress-info{flex:1}
#resize-status-text{font-size:.9rem;color:var(--text-primary);margin-bottom:6px;display:block}
#resize-progress-bar-bg{width:100%;height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden}
#resize-progress-bar{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .3s}
#resize-results-grid{display:flex;flex-direction:column;gap:24px}
.resize-source-row{background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.resize-source-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg-input)}
.resize-source-header img{height:60px;border-radius:6px;object-fit:contain}
.resize-source-header .source-label{font-size:.85rem;color:var(--text-primary);font-weight:600}
.resize-source-header .source-sublabel{font-size:.75rem;color:var(--text-secondary)}
.resize-formats-row{display:flex;flex-wrap:wrap;gap:12px;padding:12px 16px}
.resize-format-col{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:140px}
.resize-format-col .fmt-label{font-size:.75rem;color:var(--text-secondary);text-align:center}
.resize-format-col .fmt-image-wrap{position:relative;background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:6px;min-width:120px;min-height:80px;display:flex;align-items:center;justify-content:center}
.resize-format-col .fmt-image-wrap img{max-width:160px;max-height:140px;border-radius:4px;object-fit:contain;cursor:pointer}
.resize-format-col .fmt-image-wrap img:hover{opacity:.85}
.resize-format-col .fmt-image-wrap .fmt-skeleton{width:120px;height:80px;background:linear-gradient(90deg,var(--bg-input) 25%,var(--border) 50%,var(--bg-input) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
.resize-format-col .fmt-image-wrap .fmt-error{font-size:.7rem;color:var(--accent);text-align:center;padding:8px}
.resize-format-col .fmt-dl-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);font-size:.7rem;padding:2px 8px;cursor:pointer}
.resize-format-col .fmt-dl-btn:hover{border-color:var(--accent-light);color:var(--text-primary)}
/* Resize Modal */
#resize-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center}
#resize-modal-content{position:relative;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;width:90vw;max-width:640px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
#resize-body{padding:20px;overflow-y:auto}
#resize-description{font-size:.85rem;color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
.resize-format-option{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;font-size:.85rem;color:var(--text-primary);transition:border-color .2s}
.resize-format-option:hover{border-color:var(--accent-light)}
.resize-format-option input{accent-color:var(--accent)}
#resize-source-info{margin-top:12px;font-size:.85rem;color:var(--text-secondary)}
#resize-progress-bar-bg{width:100%;height:6px;background:var(--bg-input);border-radius:3px;margin-top:8px;overflow:hidden}
#resize-progress-bar{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .3s}
#resize-progress-text{font-size:.85rem;color:var(--text-secondary);margin-top:12px}
#resize-results{margin-top:16px;display:flex;flex-direction:column;gap:12px}
.resize-result-group{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.resize-result-header{padding:8px 12px;background:var(--bg-input);font-size:.85rem;font-weight:600;color:var(--text-primary);display:flex;justify-content:space-between;align-items:center}
.resize-result-images{display:flex;flex-wrap:wrap;gap:8px;padding:8px}
.resize-result-images img{max-height:150px;border-radius:6px;cursor:pointer;border:2px solid transparent;object-fit:contain}
.resize-result-images img:hover{border-color:var(--accent)}
/* Edit Modal */
#edit-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center}
#edit-modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#edit-modal-content{position:relative;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;width:90vw;max-width:1000px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
#edit-modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
#edit-modal-header h3{margin:0;font-size:1.1rem;color:var(--text-primary)}
#edit-modal-close{background:none;border:none;color:var(--text-secondary);font-size:1.5rem;cursor:pointer;padding:0 4px}
#edit-modal-close:hover{color:var(--text-primary)}
#edit-modal-body{display:flex;flex:1;overflow:hidden;min-height:0}
#edit-image-container{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;background:var(--bg-primary)}
#edit-image-container img{max-width:100%;max-height:60vh;border-radius:8px;object-fit:contain}
#edit-controls{width:320px;display:flex;flex-direction:column;padding:16px;border-left:1px solid var(--border);gap:12px}
#edit-instruction{flex:none;height:140px;resize:vertical;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);padding:10px;font-size:.85rem;font-family:inherit}
#edit-history{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0}
.edit-history-item{background:var(--bg-input);border-radius:var(--radius);padding:8px 10px;font-size:.8rem;color:var(--text-secondary);border-left:3px solid var(--accent)}
#edit-buttons{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
/* Responsive */
@media(max-width:768px){
  body{flex-direction:column}
  #sidebar{width:100%;min-width:auto;max-height:45vh;border-right:none;border-bottom:1px solid var(--border)}
}
/* Sub upload zones (product/logo) */
.sub-upload-zone{border:1px dashed var(--border);border-radius:var(--radius);padding:10px;text-align:center;cursor:pointer;font-size:.8rem;color:var(--text-secondary);transition:border-color .2s;position:relative}
.sub-upload-zone:hover{border-color:var(--accent-light)}
.sub-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.sub-preview{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.sub-preview .thumb{position:relative;width:40px;height:40px}
.sub-preview .thumb img{width:100%;height:100%;object-fit:cover;border-radius:4px;border:1px solid var(--border)}
.sub-preview .thumb .remove{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;border:none;border-radius:50%;width:14px;height:14px;font-size:10px;line-height:14px;text-align:center;cursor:pointer;padding:0}
/* API key toggle */
.key-row{display:flex;gap:6px}
.key-row input{flex:1}
.key-row button{
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text-secondary);
  cursor:pointer;padding:0 10px;font-size:.9rem;
}
/* Aspect ratio select */
select{cursor:pointer}
select option{background:var(--bg-input)}
</style>
</head>
<body>

<div id="sidebar">
  <h1><span>⚡</span> CR一括生成ツール</h1>

  <div class="section">
    <div class="section-label">APIキー</div>
    <div class="key-row">
      <input type="password" id="api-key" placeholder="Gemini APIキーを入力">
      <button id="key-toggle" title="表示/非表示">👁</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">参考画像</div>
    <div id="upload-zone">
      <div>ドラッグ＆ドロップ または クリックで選択</div>
      <div style="font-size:.75rem;margin-top:4px;color:var(--text-secondary)">PNG / JPG / WebP</div>
      <input type="file" id="file-input" multiple accept="image/*">
    </div>
    <div id="preview-images"></div>
  </div>

  <div class="section">
    <div class="section-label">商品画像 <span style="font-size:.7rem;color:var(--text-secondary)">(任意)</span></div>
    <div id="product-upload-zone" class="sub-upload-zone">
      <div>商品画像をアップロード</div>
      <input type="file" id="product-file-input" multiple accept="image/*">
    </div>
    <div id="product-preview-images" class="sub-preview"></div>
  </div>

  <div class="section">
    <div class="section-label">ロゴ <span style="font-size:.7rem;color:var(--text-secondary)">(任意)</span></div>
    <div id="logo-upload-zone" class="sub-upload-zone">
      <div>ロゴ画像をアップロード</div>
      <input type="file" id="logo-file-input" multiple accept="image/*">
    </div>
    <div id="logo-preview-images" class="sub-preview"></div>
  </div>

  <div class="section">
    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      プロンプト
      <button id="btn-template" class="btn btn-outline" style="padding:3px 8px;font-size:.7rem">テンプレを挿入</button>
    </div>
    <textarea id="prompt" placeholder="クリエイティブ生成の指示を入力...&#10;「テンプレを挿入」ボタンで参考例を挿入できます"></textarea>
  </div>

  <div class="section">
    <div class="section-label">設定</div>
    <div class="config-row">
      <label>同時生成数</label>
      <input type="range" id="parallel-count" min="1" max="10" value="5">
      <span class="range-val" id="parallel-val">5</span>
    </div>
    <div class="config-row">
      <label>モデル</label>
      <select id="model-select">
        <option value="gemini-2.5-flash-image">2.5 Flash Image</option>
        <option value="gemini-3.1-flash-image-preview">3.1 Flash Image (NanoBanana2)</option>
        <option value="gemini-3-pro-image-preview">3 Pro Image</option>
      </select>
    </div>
    <div class="config-row">
      <label>アスペクト比</label>
      <select id="aspect-ratio">
        <option value="1:1" data-w="1080" data-h="1080">1080×1080 (Meta/Instagram正方形)</option>
        <option value="1:1" data-w="600" data-h="600">600×600 (GDN正方形)</option>
        <option value="16:9" data-w="1200" data-h="628">1200×628 (Meta横長/GDN)</option>
        <option value="16:9" data-w="1920" data-h="1080">1920×1080 (YouTube横長)</option>
        <option value="9:16" data-w="1080" data-h="1920">1080×1920 (ストーリーズ/リール)</option>
        <option value="4:5" data-w="1080" data-h="1350">1080×1350 (Instagram縦長)</option>
        <option value="3:4" data-w="1080" data-h="1440">1080×1440 (3:4縦長)</option>
      </select>
    </div>
    <div class="config-row">
      <label>多様性</label>
      <input type="range" id="temperature" min="0" max="20" value="16" step="1">
      <span class="range-val" id="temp-val">1.6</span>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btn-generate">生成開始</button>
  </div>
  <div class="btn-group">

<script>
// ===== State =====
const State = {
  apiKey: localStorage.getItem('gemini-api-key') || '',
  referenceImages: [], // [{name, base64, mimeType}]
  productImages: [],   // [{name, base64, mimeType}]
  logoImages: [],      // [{name, base64, mimeType}]
  prompt: '',
  parallelCount: parseInt(localStorage.getItem('gemini-parallel-count')) || 5,
  aspectRatio: localStorage.getItem('gemini-aspect-ratio') || '1:1',
  rounds: [],
  currentRound: -1,
  currentView: 'round', // 'round' or 'resize'
  generating: false,
  resizeResults: [], // [{sourceImage, sourceIndex, formats: [{key, w, h, label, status, imageBase64, mimeType, errorMessage}]}]
};

// ===== DOM refs =====
const $apiKey = document.getElementById('api-key');

// ===== Init =====

// ===== Aspect ratio =====
function updateAspectState() {

}
const savedAspectIndex = localStorage.getItem('gemini-aspect-ratio-index');
if (savedAspectIndex !== null) $aspectRatio.selectedIndex = savedAspectIndex;
updateAspectState();
$aspectRatio.addEventListener('change', updateAspectState);

// ===== Temperature =====
State.temperature = parseInt($temperature.value) / 10;
$temperature.addEventListener('input', () => {
  State.temperature = parseInt($temperature.value) / 10;
  $tempVal.textContent = State.temperature.toFixed(1);

// ===== File upload =====
$uploadZone.addEventListener('click', () => $fileInput.click());
$uploadZone.addEventListener('dragover', e => { e.preventDefault(); $uploadZone.classList.add('dragover'); });
$uploadZone.addEventListener('dragleave', () => $uploadZone.classList.remove('dragover'));
$uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  $uploadZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
$fileInput.addEventListener('change', () => { handleFiles($fileInput.files); $fileInput.value = ''; });

async function handleFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const { base64, mimeType } = await fileToBase64(file);
    State.referenceImages.push({ name: file.name, base64, mimeType });
  }
  renderPreviews();
}

function fileToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(',')[1];
      resolve({ base64, mimeType: file.type });
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  $previewImages.innerHTML = '';
  State.referenceImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="data:${img.mimeType};base64,${img.base64}"><button class="remove" data-i="${i}">&times;</button>`;
    $previewImages.appendChild(div);
  });
  $previewImages.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      State.referenceImages.splice(parseInt(btn.dataset.i), 1);
      renderPreviews();
    });
  });
}

// ===== Product & Logo Upload =====
function setupSubUpload(zoneId, inputId, previewId, stateKey) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    handleSubFiles(e.dataTransfer.files, stateKey, preview);
  });
  input.addEventListener('change', () => { handleSubFiles(input.files, stateKey, preview); input.value = ''; });
}

async function handleSubFiles(files, stateKey, previewEl) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const { base64, mimeType } = await fileToBase64(file);
    State[stateKey].push({ name: file.name, base64, mimeType });
  }
  renderSubPreviews(stateKey, previewEl);
}

function renderSubPreviews(stateKey, previewEl) {
  previewEl.innerHTML = '';
  State[stateKey].forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="data:${img.mimeType};base64,${img.base64}"><button class="remove" data-i="${i}">&times;</button>`;
    previewEl.appendChild(div);
  });
  previewEl.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      State[stateKey].splice(parseInt(btn.dataset.i), 1);
      renderSubPreviews(stateKey, previewEl);
    });
  });
}

setupSubUpload('product-upload-zone', 'product-file-input', 'product-preview-images', 'productImages');
setupSubUpload('logo-upload-zone', 'logo-file-input', 'logo-preview-images', 'logoImages');

// ===== Resize image to exact pixel dimensions =====
function resizeImageToPixels(base64, mimeType, targetW, targetH) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      // Draw with cover-fit (fill entire canvas, crop excess)
      const scale = Math.max(targetW / img.width, targetH / img.height);
      const sw = targetW / scale;
      const sh = targetH / scale;
      const sx = (img.width - sw) / 2;
      const sy = (img.height - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      const outType = mimeType === 'image/jpeg' ? 'image/jpeg' : 'image/png';
      const dataUrl = canvas.toDataURL(outType, 0.95);
      resolve({
        base64: dataUrl.split(',')[1],
        mimeType: outType,
      });
    };
    img.src = `data:${mimeType};base64,${base64}`;
  });
}

// ===== Prompt =====
$prompt.addEventListener('input', () => { State.prompt = $prompt.value; });

const PROMPT_TEMPLATE = `＃依頼
クリエイティブのコピーは変えず、デザインや構成を変えてクリエイティブを生成したい
1枚目：デザインA

#条件

#成果の良いコピー
・
・

document.getElementById('btn-template').addEventListener('click', () => {
  if ($prompt.value.trim() && !confirm('現在のプロンプトを上書きしますか？')) return;

$modelSelect.value = localStorage.getItem('gemini-model') || 'gemini-2.5-flash-image';
State.model = $modelSelect.value;

// ===== Gemini API =====
const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

async function callGeminiAPI(parts) {
  const model = State.model || 'gemini-2.5-flash-image';
  const url = `${API_BASE}/${model}:generateContent`;
  const body = {
    contents: [{ parts }],
    generationConfig: {
      responseModalities: ['TEXT', 'IMAGE'],
      temperature: State.temperature ?? 1.6,
    },
  };
  if (State.aspectRatio !== '1:1') {
    body.generationConfig.imageConfig = { aspectRatio: State.aspectRatio };
  }

  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-goog-api-key': State.apiKey,
    },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const errData = await resp.json().catch(() => ({}));
    const msg = errData?.error?.message || `HTTP ${resp.status}`;
    throw new Error(msg);
  }

  const data = await resp.json();
  const candidate = data.candidates?.[0];
  if (!candidate) throw new Error('レスポンスが空です');

  const imgPart = candidate.content?.parts?.find(p => p.inlineData);
  const textPart = candidate.content?.parts?.find(p => p.text);

  if (!imgPart) {
    throw new Error(textPart?.text || '画像が生成されませんでした');
  }

  return {
    imageBase64: imgPart.inlineData.data,
    mimeType: imgPart.inlineData.mimeType || 'image/png',
    text: textPart?.text || '',
  };
}

// ===== Generation =====
async function runGeneration(contextImages = [], rejectedImages = []) {
  if (!State.apiKey) { showToast('APIキーを入力してください', 'error'); return; }
  if (!State.prompt.trim() && State.referenceImages.length === 0) {
    showToast('プロンプトまたは参考画像を設定してください', 'error'); return;
  }

  State.generating = true;
  State.abortGeneration = false;
  updateButtons();

  const roundIndex = State.rounds.length;
  const round = {
    id: roundIndex + 1,
    results: Array.from({ length: State.parallelCount }, (_, i) => ({
      id: `r${roundIndex}-${i}`,
      status: 'loading',
      imageBase64: null,
      mimeType: 'image/png',
      selection: 'none',
      errorMessage: null,
      text: '',
    })),
  };
  State.rounds.push(round);
  State.currentRound = roundIndex;
  renderRoundTabs();
  renderGrid();
  setStatus('active', `生成中... (0/${State.parallelCount} 完了)`);

  // Style variations to ensure diverse outputs
  // Style variations - mostly single-image, a few multi-panel allowed
  const styleVariations = [
    // 1枚絵系（大半）
    '背景全体に商品写真を大きく1枚使い、上にキャッチコピーを重ねる。画像は1枚構成で。',
    '人物の写真を中心に1枚配置し、感情に訴えるコピーを添える。画像は1枚構成で。',
    'グラデーション背景に商品パッケージと大きな文字のみ。シンプルな1枚構成。',
    '暖色系の単色背景。商品を中央に配置し、周囲に装飾的なテキスト。1枚の完成画像。',
    '寒色系の落ち着いた単色背景。信頼感のあるプロフェッショナルな1枚。',
    'ナチュラル・オーガニックな写真背景に溶け込むテキスト。1枚の完成画像。',
    '鮮やかなポップカラーの背景に、太くて目立つキャッチコピー。1枚の完成画像。',
    'ダーク背景にゴールドや白のテキスト。プレミアム感のある1枚。',
    '手書き風フォントと柔らかい色合い。親しみやすさを重視した1枚。',
    '大きな数字（割引率・実績）を画面中央にドンと配置するインパクト型の1枚。',
    'ライフスタイル写真の上に半透明オーバーレイでテキストを重ねる1枚。',
    'マガジン広告風。1枚の印象的な写真の上に洗練されたタイポグラフィ。',
    'パステルカラーの優しいトーン。女性向けの柔らかい雰囲気の1枚。',
    'フラットデザイン。イラスト的な要素と大きな文字で構成した1枚。',
    '斜めのカラーブロックで画面を区切り、片側に写真、片側にコピーの1枚。',
    // 分割・比較系（少数）
    'ビフォーアフター構成。左右2分割で変化を視覚的に伝えるレイアウト。',
    '上下または左右に2〜3枚の写真を並べたコラージュ風の構成。',
    '複数のステップや特徴を並べて紹介するレイアウト。',
  ];

  // Build per-call parts with unique style variation
  function buildPartsForCall(index) {
    const callParts = [];
    if (State.prompt.trim()) {
      let promptText = State.prompt.trim();
      if (contextImages.length > 0) {
        promptText += '\n\nこれらの「良い例」の画像のテイストを参考にしつつ、新しいバリエーションを生成してください。';
      }
      if (rejectedImages.length > 0) {
        promptText += '\n\nまた「悪い例」の画像も添付します。これらとは異なるデザイン・構成・配色にしてください。悪い例のスタイルやレイアウトを避けてください。';
      }
      const variation = styleVariations[index % styleVariations.length];
      // Build product/logo instruction
      let assetInstruction = '';
      if (State.productImages.length > 0) {
        assetInstruction += `\n6. 【商品画像について】この後に添付する「商品画像」を必ずそのまま使用してください。商品のパッケージや見た目を勝手に変更・創作しないでください。添付された商品画像の見た目を忠実に再現してください。`;
      }
      if (State.logoImages.length > 0) {
        assetInstruction += `\n7. 【ロゴについて】この後に添付する「ロゴ画像」を必ずそのまま使用してください。ロゴのデザイン・色・形を一切変更せず、そのまま配置してください。ロゴを勝手に作り変えないでください。`;
      }

      const systemInstruction = `あなたは広告クリエイティブデザイナーです。以下のルールを守って広告画像を生成してください。

【ルール】
1. そのまま広告媒体に入稿できる、完成された広告バナーを出力してください。
2. 「Design A」「パターン1」などのラベルや、デザインの説明文・注釈は画像内に入れないでください。
3. 「デザイン案の比較」として複数案を並べるのではなく、1つの完成されたクリエイティブとして出力してください。
4. 画像サイズは${State.targetW}×${State.targetH}pxの構図で作成してください。
5. テキストは読みやすいフォントで出力し、参考画像のコピーを踏襲してください。${assetInstruction}

【デザインスタイル】
${variation}

【広告の内容】
`;
      callParts.push({ text: systemInstruction + promptText });
    }
    // Reference images - shuffle subset for variety if many images
    const refImages = [...State.referenceImages];
    if (refImages.length > 3) {
      for (let j = refImages.length - 1; j > 0; j--) {
        const k = Math.floor(Math.random() * (j + 1));
        [refImages[j], refImages[k]] = [refImages[k], refImages[j]];
      }
      const subsetSize = Math.max(2, Math.ceil(refImages.length * 0.6));
      refImages.length = subsetSize;
    }
    for (const img of refImages) {
      callParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
    }
    // Product images
    if (State.productImages.length > 0) {
      callParts.push({ text: '以下は「商品画像」です。この商品の見た目をそのまま忠実に使用してください。勝手に商品画像を創作しないでください：' });
      for (const img of State.productImages) {
        callParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
      }
    }
    // Logo images
    if (State.logoImages.length > 0) {
      callParts.push({ text: '以下は「ロゴ画像」です。このロゴをデザイン・色・形を一切変更せずにそのまま配置してください。ロゴを勝手に作り変えないでください：' });
      for (const img of State.logoImages) {
        callParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
      }
    }
    // Good examples (selected images from previous rounds)
    if (contextImages.length > 0) {
      callParts.push({ text: '以下は「良い例」です。このテイストを参考にしてください：' });
      for (const img of contextImages) {
        callParts.push({ inlineData: { mimeType: img.mimeType, data: img.imageBase64 } });
      }
    }
    // Bad examples (rejected images as negative feedback)
    if (rejectedImages.length > 0) {
      // Send max 3 rejected images to avoid token bloat
      const rejects = rejectedImages.slice(0, 3);
      callParts.push({ text: '以下は「悪い例」です。これらのデザイン・構図・配色は避けてください：' });
      for (const img of rejects) {
        callParts.push({ inlineData: { mimeType: img.mimeType, data: img.imageBase64 } });
      }
    }
    return callParts;
  }

  let completed = 0;

  // Launch calls in batches of 3 with stagger, checking abort between each
  const BATCH_SIZE = 3;
  const STAGGER_MS = 1500;

  for (let batchStart = 0; batchStart < round.results.length; batchStart += BATCH_SIZE) {
    if (State.abortGeneration) break;

    const batchEnd = Math.min(batchStart + BATCH_SIZE, round.results.length);
    const batchPromises = [];

    for (let i = batchStart; i < batchEnd; i++) {
      const result = round.results[i];
      const callParts = buildPartsForCall(i);
      const staggerDelay = (i - batchStart) * STAGGER_MS;

      batchPromises.push(
        new Promise(resolve => setTimeout(resolve, staggerDelay))
          .then(() => {
            if (State.abortGeneration) { result.status = 'cancelled'; result.errorMessage = '中断されました'; return; }
            return callGeminiAPIWithRetry(callParts, 5);
          })
          .then(async data => {
            if (!data || State.abortGeneration) return;
            const resized = await resizeImageToPixels(
              data.imageBase64, data.mimeType, State.targetW, State.targetH
            );
            result.status = 'success';
            result.imageBase64 = resized.base64;
            result.mimeType = resized.mimeType;
            result.text = data.text;
          })
          .catch(err => {
            if (result.status !== 'cancelled') {
              result.status = 'error';
              result.errorMessage = err.message;
            }
          })
          .finally(() => {
            completed++;
            setStatus('active', `生成中... (${completed}/${State.parallelCount} 完了)`);
            if (State.currentRound === roundIndex) renderGrid();
          })
      );
    }

    await Promise.allSettled(batchPromises);
  }

  // Mark remaining loading items as cancelled
  if (State.abortGeneration) {
    round.results.forEach(r => {
      if (r.status === 'loading') { r.status = 'cancelled'; r.errorMessage = '中断されました'; }
    });
    renderGrid();
  }

  State.generating = false;
  State.abortGeneration = false;
  const successCount = round.results.filter(r => r.status === 'success').length;
  const errorCount = round.results.filter(r => r.status === 'error').length;
  const cancelCount = round.results.filter(r => r.status === 'cancelled').length;
  let statusMsg = `Round ${round.id}: ${successCount}件成功`;
  if (errorCount > 0) statusMsg += ` / ${errorCount}件エラー`;
  if (cancelCount > 0) statusMsg += ` / ${cancelCount}件中断`;
  setStatus('idle', statusMsg);
  updateButtons();
  updateSelectionCount();
}

async function callGeminiAPIWithRetry(parts, maxRetries) {
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      const result = await callGeminiAPI(parts);
      return result;
    } catch (err) {
      const isRetryable = err.message.includes('429')
        || err.message.includes('RESOURCE_EXHAUSTED')
        || err.message.includes('high demand')
        || err.message.includes('overloaded')
        || err.message.includes('503')
        || err.message.includes('画像が生成されませんでした');
      if (attempt < maxRetries && isRetryable) {
        // Exponential backoff: 3s, 6s, 12s, 24s, 48s + random jitter
        const baseWait = 3000 * Math.pow(2, attempt);
        const jitter = Math.random() * 2000;
        await new Promise(r => setTimeout(r, baseWait + jitter));
        continue;
      }
      throw err;
    }
  }
}

// ===== Round Tabs =====
function renderRoundTabs() {
  $roundTabs.innerHTML = '';
  if (State.rounds.length === 0 && State.resizeResults.length === 0) return;
  State.rounds.forEach((round, i) => {
    const btn = document.createElement('button');
    btn.className = `round-tab${State.currentView === 'round' && i === State.currentRound ? ' active' : ''}`;
    btn.textContent = `Round ${round.id}`;
    btn.addEventListener('click', () => {
      State.currentView = 'round';
      State.currentRound = i;
      renderRoundTabs();
      switchView();
      updateSelectionCount();
    });
    $roundTabs.appendChild(btn);
  });
  // Resize tab
  if (State.resizeResults.length > 0) {
    const btn = document.createElement('button');
    btn.className = `round-tab${State.currentView === 'resize' ? ' active' : ''}`;
    btn.style.cssText = 'border-color:#00b894;color:#00b894;';
    btn.textContent = `リサイズ結果 (${State.resizeResults.length})`;
    btn.addEventListener('click', () => {
      State.currentView = 'resize';
      renderRoundTabs();
      switchView();
    });
    $roundTabs.appendChild(btn);
  }
}

function switchView() {
  const $resizeView = document.getElementById('resize-view');
  if (State.currentView === 'resize') {
    $resultsGrid.style.display = 'none';
    $noRounds.style.display = 'none';
    $resizeView.style.display = 'block';
    renderResizeView();
  } else {
    $resizeView.style.display = 'none';
    renderGrid();
  }
}

// ===== Grid Rendering =====
function renderGrid() {
  if (State.rounds.length === 0) {
    $noRounds.style.display = 'flex';
    $resultsGrid.style.display = 'none';
    $selToolbar.classList.remove('visible');
    return;
  }
  $noRounds.style.display = 'none';
  $resultsGrid.style.display = 'grid';
  $selToolbar.classList.add('visible');

  const round = State.rounds[State.currentRound];
  if (!round) return;

  $resultsGrid.innerHTML = '';
  round.results.forEach((result, i) => {
    const card = document.createElement('div');
    card.className = `image-card ${result.selection}`;
    card.innerHTML = buildCardHTML(result, i);
    $resultsGrid.appendChild(card);

    // Bind card action buttons
    const selectBtn = card.querySelector('.act-select');
    const rejectBtn = card.querySelector('.act-reject');
    const dlBtn = card.querySelector('.act-dl');
    const refBtn = card.querySelector('.act-ref');

    if (selectBtn) selectBtn.addEventListener('click', () => toggleSelection(result, 'selected', card));
    if (rejectBtn) rejectBtn.addEventListener('click', () => toggleSelection(result, 'rejected', card));
    if (dlBtn) dlBtn.addEventListener('click', () => downloadSingle(result, i));
    if (refBtn) refBtn.addEventListener('click', () => addAsReference(result));

    const editBtn = card.querySelector('.act-edit');
    if (editBtn) editBtn.addEventListener('click', () => openEditModal(result, i));

    const retryBtn = card.querySelector('.btn-retry');
    if (retryBtn) retryBtn.addEventListener('click', () => retryGeneration(round, result, i, card));
  });
}

function buildCardHTML(result, index) {
  let imageArea = '';
  let badge = '';
  let actions = '';

  if (result.status === 'loading') {
    imageArea = '<div class="skeleton"></div>';
  } else if (result.status === 'cancelled') {
    imageArea = `<div class="card-error"><div class="err-icon">⏹</div><div>中断されました</div><button class="btn-retry">生成する</button></div>`;
  } else if (result.status === 'error') {
    imageArea = `<div class="card-error"><div class="err-icon">⚠</div><div>${escapeHtml(result.errorMessage)}</div><button class="btn-retry">再試行</button></div>`;
  } else {
    imageArea = `<img src="data:${result.mimeType};base64,${result.imageBase64}" alt="Generated ${index + 1}">`;
  }

  if (result.selection === 'selected') badge = '<div class="card-badge badge-selected">採用</div>';
  else if (result.selection === 'rejected') badge = '<div class="card-badge badge-rejected">不採用</div>';

  if (result.status === 'success') {
    actions = `<div class="card-actions">
      <button class="act-select${result.selection === 'selected' ? ' on' : ''}">✓ 採用</button>
      <button class="act-reject${result.selection === 'rejected' ? ' on' : ''}">✗ 不採用</button>
      <button class="act-edit" title="修正">✎</button>
      <button class="act-dl">↓</button>
      <button class="act-ref" title="参考画像に追加">📎</button>
    </div>`;
  }

  return `<div class="card-image">${badge}${imageArea}</div>${actions}`;
}

function toggleSelection(result, type, card) {
  result.selection = result.selection === type ? 'none' : type;
  card.className = `image-card ${result.selection}`;
  // Re-render card content
  const index = State.rounds[State.currentRound].results.indexOf(result);
  card.innerHTML = buildCardHTML(result, index);
  // Re-bind
  const selectBtn = card.querySelector('.act-select');
  const rejectBtn = card.querySelector('.act-reject');
  const dlBtn = card.querySelector('.act-dl');
  const refBtn = card.querySelector('.act-ref');
  if (selectBtn) selectBtn.addEventListener('click', () => toggleSelection(result, 'selected', card));
  if (rejectBtn) rejectBtn.addEventListener('click', () => toggleSelection(result, 'rejected', card));
  if (dlBtn) dlBtn.addEventListener('click', () => downloadSingle(result, index));
  if (refBtn) refBtn.addEventListener('click', () => addAsReference(result));
  const editBtn2 = card.querySelector('.act-edit');
  if (editBtn2) editBtn2.addEventListener('click', () => openEditModal(result, index));

  updateSelectionCount();
  updateButtons();
}

function updateSelectionCount() {
  if (State.rounds.length === 0) return;
  const round = State.rounds[State.currentRound];
  const count = round ? round.results.filter(r => r.selection === 'selected').length : 0;
  $selCount.textContent = `${count}件選択中`;
}

// ===== Status =====
function setStatus(mode, text) {
  $statusDot.className = `dot${mode === 'active' ? ' active' : ''}`;
  $statusText.textContent = text;
}

function updateButtons() {
  if (State.generating && !State.abortGeneration) {
    $btnGenerate.disabled = false;
    $btnGenerate.textContent = '⏹ 中断する';
    $btnGenerate.style.background = 'var(--accent)';
  } else if (State.generating && State.abortGeneration) {
    $btnGenerate.disabled = true;
    $btnGenerate.textContent = '中断中...';
    $btnGenerate.style.background = '';
  } else {
    $btnGenerate.disabled = false;
    $btnGenerate.textContent = '生成開始';
    $btnGenerate.style.background = '';
  }

  const hasSelected = State.rounds.some(r => r.results.some(res => res.selection === 'selected'));
  $btnContinue.disabled = !hasSelected;
  $btnDownload.disabled = !hasSelected;
  $btnResize.disabled = !hasSelected;
}

// ===== Actions =====
$btnGenerate.addEventListener('click', () => {
  if (State.generating) {
    // Stop generation
    State.abortGeneration = true;
    $btnGenerate.textContent = '中断中...';
    $btnGenerate.disabled = true;
    showToast('生成を中断しています...', 'info');
  } else {
    runGeneration();
  }
});

$btnContinue.addEventListener('click', () => {
  const selectedImages = [];
  const rejectedImages = [];
  State.rounds.forEach(round => {
    round.results.forEach(r => {
      if (r.status === 'success') {
        if (r.selection === 'selected') selectedImages.push(r);
        else if (r.selection === 'rejected') rejectedImages.push(r);
      }
    });
  });
  if (selectedImages.length === 0) { showToast('画像を選択してください', 'error'); return; }
  runGeneration(selectedImages, rejectedImages);
});

$btnDownload.addEventListener('click', () => {
  let count = 0;
  State.rounds.forEach(round => {
    round.results.forEach((r, i) => {
      if (r.selection === 'selected' && r.status === 'success') {
        count++;
        setTimeout(() => downloadSingle(r, count), count * 200);
      }
    });
  });
  if (count > 0) showToast(`${count}件の画像をダウンロード中...`, 'success');
});

$btnSelectAll.addEventListener('click', () => {
  const round = State.rounds[State.currentRound];
  if (!round) return;
  round.results.forEach(r => { if (r.status === 'success') r.selection = 'selected'; });
  renderGrid();
  updateSelectionCount();
  updateButtons();
});

$btnDeselectAll.addEventListener('click', () => {
  const round = State.rounds[State.currentRound];
  if (!round) return;
  round.results.forEach(r => { r.selection = 'none'; });
  renderGrid();
  updateSelectionCount();
  updateButtons();
});

document.getElementById('btn-retry-all').addEventListener('click', async () => {
  const round = State.rounds[State.currentRound];
  if (!round) return;
  const errorResults = round.results
    .map((r, i) => ({ result: r, index: i }))
    .filter(({ result }) => result.status === 'error');
  if (errorResults.length === 0) { showToast('エラーはありません', 'info'); return; }
  showToast(`${errorResults.length}件を再試行中...`, 'info');

  // Reset all error cards to loading
  errorResults.forEach(({ result }) => { result.status = 'loading'; result.errorMessage = null; });
  renderGrid();

  // Stagger retry calls
  for (let idx = 0; idx < errorResults.length; idx++) {
    const { result, index } = errorResults[idx];
    if (idx > 0) await new Promise(r => setTimeout(r, 1500));

    const parts = [];
    if (State.prompt.trim()) {
      parts.push({ text: State.prompt.trim() });
    }
    for (const img of State.referenceImages) {
      parts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
    }

    try {
      const data = await callGeminiAPIWithRetry(parts, 5);
      const resized = await resizeImageToPixels(
        data.imageBase64, data.mimeType, State.targetW, State.targetH
      );
      result.status = 'success';
      result.imageBase64 = resized.base64;
      result.mimeType = resized.mimeType;
      result.text = data.text;
    } catch (err) {
      result.status = 'error';
      result.errorMessage = err.message;
    }
    renderGrid();
  }
  showToast('再試行が完了しました', 'success');
  updateSelectionCount();
  updateButtons();
});

function downloadSingle(result, index) {
  const ext = result.mimeType.split('/')[1] || 'png';
  const a = document.createElement('a');
  a.href = `data:${result.mimeType};base64,${result.imageBase64}`;
  a.download = `creative_${String(index).padStart(3, '0')}.${ext}`;
  a.click();
}

function addAsReference(result) {
  State.referenceImages.push({
    name: `generated_${Date.now()}.png`,
    base64: result.imageBase64,
    mimeType: result.mimeType,
  });
  renderPreviews();
  showToast('参考画像に追加しました', 'success');
}

const $resizeModal = document.getElementById('resize-modal');

function openResizeModal() {
  // Count selected images
  const selected = [];
  State.rounds.forEach(round => {
    round.results.forEach(r => {
      if (r.selection === 'selected' && r.status === 'success') selected.push(r);
    });
  });
  if (selected.length === 0) { showToast('採用画像がありません', 'error'); return; }

  document.getElementById('resize-source-info').textContent = `採用画像: ${selected.length}枚`;
  document.getElementById('resize-results').innerHTML = '';
  document.getElementById('resize-progress').style.display = 'none';
  document.getElementById('btn-resize-start').disabled = false;
  document.getElementById('btn-resize-start').textContent = '変換開始';
  // Uncheck all
  $resizeModal.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
  $resizeModal.style.display = 'flex';
}

function closeResizeModal() { $resizeModal.style.display = 'none'; }

$resizeModal.querySelector('.modal-overlay').addEventListener('click', closeResizeModal);
$resizeModal.querySelector('.modal-close').addEventListener('click', closeResizeModal);
$btnResize.addEventListener('click', openResizeModal);

document.getElementById('btn-resize-start').addEventListener('click', async () => {
  const checkedFormats = [];
  $resizeModal.querySelectorAll('#resize-formats input:checked').forEach(cb => {
    const [w, h] = cb.value.split('x').map(Number);
    checkedFormats.push({ w, h, label: cb.dataset.label, key: cb.value });
  });
  if (checkedFormats.length === 0) { showToast('変換先フォーマットを選択してください', 'error'); return; }

  const selected = [];
  State.rounds.forEach(round => {
    round.results.forEach((r, i) => {
      if (r.selection === 'selected' && r.status === 'success') selected.push(r);
    });
  });

  // Close modal and switch to resize view
  closeResizeModal();

  // Build resize result structure
  State.resizeResults = selected.map((r, idx) => ({
    sourceImage: r.imageBase64,
    sourceMimeType: r.mimeType,
    sourceIndex: idx,
    formats: checkedFormats.map(fmt => ({
      key: fmt.key, w: fmt.w, h: fmt.h, label: fmt.label,
      status: 'loading', imageBase64: null, mimeType: null, errorMessage: null
    }))
  }));

  State.currentView = 'resize';
  renderRoundTabs();
  switchView();

  const totalJobs = selected.length * checkedFormats.length;
  let completedJobs = 0;

  const $progressBar = document.getElementById('resize-progress-bar');
  const $statusText = document.getElementById('resize-status-text');
  $progressBar.style.width = '0%';
  $statusText.textContent = `変換中... (0/${totalJobs})`;

  // Process each source image × format
  for (let si = 0; si < State.resizeResults.length; si++) {
    const srcEntry = State.resizeResults[si];
    for (let fi = 0; fi < srcEntry.formats.length; fi++) {
      const fmt = srcEntry.formats[fi];

      const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
      const g = gcd(fmt.w, fmt.h);
      const ratioW = fmt.w / g;
      const ratioH = fmt.h / g;

      const parts = [
        { text: `この画像を${fmt.w}×${fmt.h}ピクセル（${fmt.label}）用にリサイズ・再構成してください。

【重要ルール】
・元画像のデザイン要素（テキスト、画像、色使い、ブランド要素）は全て維持してください。
・新しいアスペクト比（${ratioW}:${ratioH}）に合わせて、レイアウトを最適に再配置してください。
・テキストの内容は一字一句変えないでください。
・余白の追加や要素の配置変更で、新しいサイズに自然にフィットさせてください。
・画像は1枚だけ出力してください。` },
        { inlineData: { mimeType: srcEntry.sourceMimeType, data: srcEntry.sourceImage } }
      ];

      try {
        const data = await callGeminiAPIWithRetry(parts, 2);
        const resized = await resizeImageToPixels(data.imageBase64, data.mimeType, fmt.w, fmt.h);
        fmt.status = 'success';
        fmt.imageBase64 = resized.base64;
        fmt.mimeType = resized.mimeType;
      } catch (err) {
        fmt.status = 'error';
        fmt.errorMessage = err.message;
      }

      completedJobs++;
      const pct = Math.round((completedJobs / totalJobs) * 100);
      $progressBar.style.width = pct + '%';
      $statusText.textContent = `変換中... (${completedJobs}/${totalJobs})`;
      if (State.currentView === 'resize') renderResizeView();

      if (completedJobs < totalJobs) {
        await new Promise(r => setTimeout(r, 1500));
      }
    }
  }

  $statusText.textContent = `変換完了！ (${completedJobs}/${totalJobs})`;
  renderRoundTabs();
  showToast('リサイズ変換が完了しました', 'success');
});

      <div>
        <div class="source-label">元画像 #${si + 1}</div>

      } else {

document.getElementById('btn-edit-apply').addEventListener('click', async () => {
  const instruction = $editInstruction.value.trim();
  if (!instruction) { showToast('修正指示を入力してください', 'error'); return; }
  if (!editState.result) return;

  const btn = document.getElementById('btn-edit-apply');
  btn.disabled = true;

  // Show elapsed time
  let elapsed = 0;
  const timer = setInterval(() => {
    elapsed++;
    btn.textContent = `修正中... (${elapsed}秒)`;
  }, 1000);
  btn.textContent = '修正中... (0秒)';

  histItem.className = 'edit-history-item';

  $editHistory.scrollTop = $editHistory.scrollHeight;

  const parts = [
    { text: `以下の画像を修正してください。修正指示以外の部分はできるだけ変更しないでください。\n\n【修正指示】\n${instruction}\n\n画像サイズは${State.targetW}×${State.targetH}pxを想定した構図を維持してください。` },
    { inlineData: { mimeType: editState.result.mimeType, data: editState.result.imageBase64 } }
  ];

  try {
    const data = await callGeminiAPIWithRetry(parts, 2);
    const resized = await resizeImageToPixels(
      data.imageBase64, data.mimeType, State.targetW, State.targetH
    );

    // Update the preview
    $editPreview.src = `data:${resized.mimeType};base64,${resized.base64}`;

    // Update the result in state
    editState.result.imageBase64 = resized.base64;
    editState.result.mimeType = resized.mimeType;

    editState.history.push(instruction);
    $editInstruction.value = '';
    showToast('修正が完了しました', 'success');
  } catch (err) {
    showToast('修正に失敗: ' + err.message, 'error');
  } finally {
    clearInterval(timer);
    btn.disabled = false;
    btn.textContent = '修正を実行';
  }
});

document.getElementById('btn-edit-accept').addEventListener('click', () => {
  if (!editState.result) return;
  editState.result.selection = 'selected';
  renderGrid();
  updateSelectionCount();
  updateButtons();
  closeEditModal();
  showToast('採用しました', 'success');
});

// ===== Retry =====
async function retryGeneration(round, result, index, card) {
  result.status = 'loading';
  result.errorMessage = null;
  card.className = 'image-card';
  card.innerHTML = buildCardHTML(result, index);

  // Build simple parts from current prompt + reference images
  const parts = [];
  if (State.prompt.trim()) {
    parts.push({ text: State.prompt.trim() });
  }
  for (const img of State.referenceImages) {
    parts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
  }

  try {
    const data = await callGeminiAPIWithRetry(parts, 5);
    const resized = await resizeImageToPixels(
      data.imageBase64, data.mimeType, State.targetW, State.targetH
    );
    result.status = 'success';
    result.imageBase64 = resized.base64;
    result.mimeType = resized.mimeType;
    result.text = data.text;
  } catch (err) {
    result.status = 'error';
    result.errorMessage = err.message;
  }
  renderGrid();
  updateSelectionCount();
  updateButtons();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
